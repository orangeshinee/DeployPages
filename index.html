<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Pages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0d0d0d;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 60px;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
  }
  .header .status {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #3d3;
    letter-spacing: 2px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3d3;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2px;
    width: 100%;
    max-width: 900px;
  }
  .card {
    background: #141414;
    border: 1px solid #222;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.2s;
    position: relative;
  }
  .card:hover {
    background: #1a1a1a;
    border-color: #333;
  }
  .card-name {
    font-size: 13px;
    font-weight: 500;
    color: #e0e0e0;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .card-path {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }
  .card-arrow {
    position: absolute;
    top: 28px;
    right: 24px;
    font-size: 12px;
    color: #333;
    transition: color 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow {
    color: #888;
    transform: translate(2px, -2px);
  }
  .footer {
    margin-top: 60px;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
  }
  .loading {
    color: #444;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .error {
    color: #933;
    font-size: 11px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Hermes Pages</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>CONNECTED</span>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="loading">LOADING...</div>
  </div>

  <div class="footer">DEPLOYED ON CLOUDFLARE PAGES · LIVE</div>

  <script>
    async function loadProjects() {
      const grid = document.getElementById('grid');
      try {
        // Fetch directory listing from GitHub API
        const resp = await fetch(
          'https://api.github.com/repos/orangeshinee/DeployPages/contents/',
          { headers: { 'Accept': 'application/vnd.github.v3+json' } }
        );
        if (!resp.ok) throw new Error('API error');
        const items = await resp.json();

        const dirs = items
          .filter(item => item.type === 'dir' && !item.name.startsWith('.'))
          .sort((a, b) => a.name.localeCompare(b.name));

        if (dirs.length === 0) {
          grid.innerHTML = '<div class="loading">NO PROJECTS YET</div>';
          return;
        }

        const base = 'https://hermespages.shine-ee-zhang-product.workers.dev/';
        grid.innerHTML = dirs.map(d => `
          <a class="card" href="${base}${d.name}/">
            <div class="card-arrow">→</div>
            <div class="card-name">${d.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
            <div class="card-path">/${d.name}/</div>
          </a>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<div class="error">FAILED TO LOAD PROJECTS</div>';
      }
    }
    loadProjects();
  </script>
</body>
</html>
